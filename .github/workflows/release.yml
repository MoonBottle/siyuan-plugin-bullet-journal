name: Release SiYuan plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: |
            package.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release

      - name: Extract changelog for version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ZH_FILE="changelogs/v${VERSION}/v${VERSION}.zh-CN.md"
          EN_FILE="changelogs/v${VERSION}/v${VERSION}.md"

          if [ -f "$ZH_FILE" ]; then
            # Chinese first, then English
            cat "$ZH_FILE" > release_notes.md
            if [ -f "$EN_FILE" ]; then
              echo "" >> release_notes.md
              echo "---" >> release_notes.md
              echo "" >> release_notes.md
              cat "$EN_FILE" >> release_notes.md
            fi
          elif [ -f "$EN_FILE" ]; then
            cat "$EN_FILE" > release_notes.md
          else
            # Fallback: extract from old changelog format
            VERSION_ESC=$(echo "$VERSION" | sed 's/\./\\./g')
            awk -v ver="$VERSION_ESC" '
              found && $0 ~ "^## \\[" && $0 !~ "^## \\[" ver "\\]" { exit }
              $0 ~ "^## \\[" ver "\\]" { found=1 }
              found { print }
            ' docs/user-guide/changelog.md > release_notes.md
          fi

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            package.zip
          body_path: release_notes.md
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
